hostname CE1
!
username cisco privilege 15 secret cisco123
!
interface GigabitEthernet1
 description mgt
 ip address dhcp
 no shutdown
!
interface GigabitEthernet2
 description to host-CE1
 ip address 192.168.1.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet3
 description to PE1
 ip address 10.11.100.1 255.255.255.0
 no shutdown
!
line vty 0 4
 login local
 transport input ssh
!
end