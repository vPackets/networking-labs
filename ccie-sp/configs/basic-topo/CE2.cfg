hostname CE2
!
username cisco privilege 15 secret cisco123
!
interface GigabitEthernet1
 description mgt
 ip address dhcp
 no shutdown
!
interface GigabitEthernet2
 description to host-CE2
 ip address 192.168.2.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet3
 description to host-CE2
 ip address 10.12.100.2 255.255.255.0
 no shutdown
!
line vty 0 4
 login local
 transport input ssh
!
end