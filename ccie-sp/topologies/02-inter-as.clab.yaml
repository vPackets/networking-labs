name: ccie-inter-as

mgmt:
  network: ccie_mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  kinds:
    cisco_xrd:
      image: vpackets/cisco-xrd-control-plane:24.4.1
    linux:
      image: vpackets/net-tools:latest

  nodes:
    # --- AS 100 ---
    RR1:
      {
        kind: cisco_xrd,
        mgmt-ipv4: 172.20.20.21,
        startup-config: configs/RR1.cfg,
      }
    PE1:
      {
        kind: cisco_xrd,
        mgmt-ipv4: 172.20.20.11,
        startup-config: configs/PE1.cfg,
      }
    P1:
      {
        kind: cisco_xrd,
        mgmt-ipv4: 172.20.20.1,
        startup-config: configs/P1.cfg,
      }
    ASBR1:
      {
        kind: cisco_xrd,
        mgmt-ipv4: 172.20.20.31,
        startup-config: configs/ASBR1.cfg,
      }

    # --- AS 200 ---
    RR2:
      {
        kind: cisco_xrd,
        mgmt-ipv4: 172.20.20.22,
        startup-config: configs/RR2.cfg,
      }
    PE2:
      {
        kind: cisco_xrd,
        mgmt-ipv4: 172.20.20.12,
        startup-config: configs/PE2.cfg,
      }
    P2:
      {
        kind: cisco_xrd,
        mgmt-ipv4: 172.20.20.2,
        startup-config: configs/P2.cfg,
      }
    ASBR2:
      {
        kind: cisco_xrd,
        mgmt-ipv4: 172.20.20.32,
        startup-config: configs/ASBR2.cfg,
      }

    # --- Customer Edge ---
    CE1:
      kind: linux
      mgmt-ipv4: 172.20.20.100
      exec:
        - ip addr add 192.0.2.100/24 dev eth1
        - ip route add 10.0.0.0/8 via 192.0.2.11
    CE2:
      kind: linux
      mgmt-ipv4: 172.20.20.101
      exec:
        - ip addr add 198.51.100.100/24 dev eth1
        - ip route add 10.0.0.0/8 via 198.51.100.12

  links:
    # AS 100 Links
    - endpoints: ["RR1:Gi0-0-0-0", "P1:Gi0-0-0-0"]
    - endpoints: ["PE1:Gi0-0-0-0", "P1:Gi0-0-0-1"]
    - endpoints: ["P1:Gi0-0-0-2", "ASBR1:Gi0-0-0-0"]

    # The Inter-AS Link
    - endpoints: ["ASBR1:Gi0-0-0-1", "ASBR2:Gi0-0-0-1"]

    # AS 200 Links
    - endpoints: ["ASBR2:Gi0-0-0-0", "P2:Gi0-0-0-1"]
    - endpoints: ["P2:Gi0-0-0-0", "PE2:Gi0-0-0-1"]
    - endpoints: ["RR2:Gi0-0-0-0", "P2:Gi0-0-0-2"]

    # CE Links
    - endpoints: ["CE1:eth1", "PE1:Gi0-0-0-2"]
    - endpoints: ["PE2:Gi0-0-0-2", "CE2:eth1"]
