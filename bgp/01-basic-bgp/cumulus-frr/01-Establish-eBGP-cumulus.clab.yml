name: eBGP-frr

topology:
  nodes:
    linux01:
      kind: linux
      image: vpackets/alpine-tools-containerlab-isp-01:latest
      exec:
        - sh /usr/local/bin/network-config.sh

    linux02:
      kind: linux
      image: vpackets/alpine-tools-containerlab-isp-02:latest
      exec:
        - sh /usr/local/bin/network-config.sh

    frr-01:
      kind: linux
      image: vpackets/ubuntu-22.04-frr:latest

    frr-02:
      kind: linux
      image: vpackets/ubuntu-22.04-frr:latest

  links:
    - endpoints: ["linux01:eth1", "frr-01:eth1"]   
    - endpoints: ["frr-01:eth2", "frr-02:eth2"]   
    - endpoints: ["linux02:eth1", "frr-02:eth1"]  