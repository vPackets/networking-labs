name: c8101-sonic-3-node-build23

mgmt:
  network: fixedips
  ipv4_subnet: 172.100.100.0/24
  ipv6_subnet: 2001:172:100:100::/80

topology:
  kinds:
    linux:
      image: c8000-clab-sonic:23
      binds: 
          - /home/brmcdoug/:/images
      env:
          IMAGE: /images/sonic-cisco-8000.bin
          PID: '8101-32H'

  nodes:
    r1:
      kind: linux
      mgmt_ipv4: 172.100.100.21
      mgmt_ipv6: 2001:172:100:100::1021


